<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're in — FMIFY</title>
<style>
  :root { --bg:#0A0F1C; --panel:#11172B; --accent:#D4A24A; --good:#5CE0A2; --ink:#F5F6F8; --ink-soft:#C3C9D6; --mute:#8089A1; --line:#1F2A44; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; -webkit-font-smoothing: antialiased; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 3rem 2.5rem; max-width: 520px; width: 100%; text-align: center; }
  .icon { font-size: 3rem; margin-bottom: 1.2rem; }
  h1 { font-size: 2rem; font-weight: 700; letter-spacing: -.03em; margin-bottom: .6rem; }
  h1 span { color: var(--accent); }
  p { color: var(--ink-soft); line-height: 1.6; margin-bottom: 1rem; font-size: .97rem; }
  .badge { display: inline-flex; align-items: center; gap: .4rem; padding: .3rem .75rem; background: rgba(92,224,162,.08); border: 1px solid rgba(92,224,162,.3); color: var(--good); border-radius: 999px; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; margin-bottom: 1.8rem; }
  .badge .led { width: 6px; height: 6px; background: var(--good); border-radius: 50%; box-shadow: 0 0 10px rgba(92,224,162,.7); }
  .back { display: inline-block; margin-top: 1.5rem; color: var(--mute); font-size: .85rem; border-bottom: 1px solid var(--line); padding-bottom: 2px; }
  .back:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚡</div>
  <div class="badge"><span class="led"></span> Received</div>
  <h1>You're <span>in.</span></h1>
  <p>We've got your information. We'll review it and be in touch within 24 hours to confirm your FMIFY setup.</p>
  <p style="font-size:.88rem; color: var(--mute);">In the meantime — if you want to learn more about what's coming, the full brief is at the link below.</p>
  <a href="/fmify" class="back">← Back to FMIFY</a>
</div>
</body>
</html>
